version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@10.28.2
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .pnpm-store/**/*
